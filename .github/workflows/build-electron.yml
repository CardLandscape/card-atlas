name: Build Electron App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: CardAtlas-Windows
            pattern: 'release/*.exe'
          - os: macos-latest
            platform: mac
            artifact: CardAtlas-macOS
            pattern: 'release/*.dmg'
          - os: ubuntu-latest
            platform: linux
            artifact: CardAtlas-Linux
            pattern: 'release/*.AppImage'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Build web assets
        run: npx vite build
        env:
          ELECTRON: 'true'
      - name: Package Electron app
        run: npx electron-builder --${{ matrix.platform }} --config electron/electron-builder.yml --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.pattern }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            CardAtlas-Windows/*
            CardAtlas-macOS/*
            CardAtlas-Linux/*
